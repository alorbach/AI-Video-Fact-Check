<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Fact-Check — Options</title>
    <link rel="stylesheet" href="sidepanel.css" />
    <style>
      body {
        max-width: 40rem;
        margin: 0 auto;
      }
      .field {
        margin-bottom: 1.25rem;
      }
      .field label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.45rem;
      }
      select {
        width: 100%;
        min-height: 48px;
        font: inherit;
        padding: 0.5rem 0.75rem;
        border: 2px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        color: var(--text);
      }
      .field-help {
        margin: 0.45rem 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }
      .checkbox-label {
        display: flex;
        align-items: flex-start;
        gap: 0.65rem;
        font-weight: 600;
        cursor: pointer;
      }
      .checkbox-label input {
        width: 1.25rem;
        height: 1.25rem;
        min-width: 1.25rem;
        margin-top: 0.2rem;
        accent-color: var(--accent, #0b57d0);
      }
      #saveMsg {
        margin-top: 0.75rem;
        font-weight: 600;
        min-height: 1.4em;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main" id="skipLink"></a>

    <header class="header">
      <h1 id="optTitle">Options</h1>
      <p id="optSubtitle" class="subtitle"></p>
    </header>

    <main id="main" class="status-card">
      <div class="field">
        <label for="defaultChat" id="labelDefaultChat"></label>
        <select id="defaultChat">
          <option value="chatgpt_video_faktencheck" id="optGpt"></option>
          <option value="gemini_web" id="optGemini"></option>
        </select>
      </div>

      <div class="field">
        <label for="fontSize" id="labelFontSize"></label>
        <select id="fontSize">
          <option value="normal" id="optFontNormal"></option>
          <option value="large" id="optFontLarge"></option>
        </select>
        <p id="fontSizeHelp" class="field-help"></p>
      </div>

      <div class="field">
        <label class="checkbox-label">
          <input type="checkbox" id="rememberLastPackage" />
          <span id="labelRememberPackage"></span>
        </label>
        <p id="rememberPackageHelp" class="field-help"></p>
      </div>

      <button type="button" id="btnSave" class="btn primary"></button>
      <p id="saveMsg" aria-live="polite"></p>
    </main>

    <footer class="footer">
      <p>
        <span id="creditsLabel"></span>
        <a
          href="https://github.com/alorbach/"
          target="_blank"
          rel="noopener noreferrer"
          >Andre Lorbach</a
        >
        ·
        <a
          href="https://github.com/alorbach/AI-Video-Fact-Check"
          target="_blank"
          rel="noopener noreferrer"
          >AI-Video-Fact-Check</a
        >
      </p>
    </footer>

    <script type="module" src="options.js"></script>
  </body>
</html>
